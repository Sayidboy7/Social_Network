{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Inbox</title>
    <!-- <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}"> -->
    <style type="text/css">
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#eceff1;
        }
    
        .chat-container{
            display:flex;
            height:100vh;
        }
    
        /* Sidebar */
    
        .sidebar{
            width: 100%;
            margin: 10px 10px;
            background:white;
            border-right: 1px solid #ddd;
            display:flex;
            flex-direction:column;
        }
    
        .sidebar-header{
            text-align: center;
            padding: 20px;
            border-bottom:1px solid #ddd;
        }
    
        .search-box{
            padding:15px;
        }
    
        .search-box input{
            width:100%;
            padding:12px;
            border:none;
            background:#f1f1f1;
            border-radius:8px;
            outline:none;
        }
    
        .chat-list{
            overflow-y:auto;
            flex:1;
        }
    
        .chat-item{
            display:flex;
            align-items:center;
            padding:15px;
            cursor:pointer;
            transition:.3s;
        }
    
        .chat-item:hover{
            background:#f4f4f4;
        }
    
        .chat-item.active{
            background:#e3f2fd;
        }
    
        .chat-item img{
            width:55px;
            height:55px;
            border-radius:50%;
            object-fit:cover;
        }
    
        .chat-info{
            margin-left:15px;
            width:100%;
        }
    
        .top{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
    
        .top span{
            color:#888;
            font-size:12px;
        }
    
        .chat-info h4{
            font-size:17px;
        }
    
        .chat-info p{
            color:#777;
            font-size:14px;
            margin-top:4px;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
    
        /* Chat */
    
        .chat-window{
            flex:1;
            display:flex;
            flex-direction:column;
            background:#f7f7f7;
        }
    
        .chat-header{
            background:white;
            border-bottom:1px solid #ddd;
            padding:15px 20px;
            display:flex;
            align-items:center;
        }
    
        .chat-header img{
            width:50px;
            height:50px;
            border-radius:50%;
            margin-right:15px;
        }
    
        .chat-header small{
            color:green;
        }
    
        /* Messages */
    
        .messages{
            flex:1;
            overflow-y:auto;
            padding:20px;
            display:flex;
            flex-direction:column;
        }
    
        .message{
            max-width:60%;
            padding:12px 18px;
            margin-bottom:15px;
            border-radius:20px;
            word-wrap:break-word;
        }
    
        .received{
            background:white;
            align-self:flex-start;
            border-bottom-left-radius:5px;
        }
    
        .sent{
            background:#0084ff;
            color:white;
            align-self:flex-end;
            border-bottom-right-radius:5px;
        }
    
        /* Input */
    
        .message-input{
            display:flex;
            padding:15px;
            background:white;
            border-top:1px solid #ddd;
        }
    
        .message-input input{
            flex:1;
            padding:12px;
            border:1px solid #ddd;
            border-radius:30px;
            outline:none;
        }
    
        .message-input button{
            margin-left:10px;
            padding:12px 25px;
            border:none;
            background:#0084ff;
            color:white;
            border-radius:30px;
            cursor:pointer;
        }
    
        .message-input button:hover{
            background:#006fd6;
        }

        .chat-item a {
            text-decoration: none;
            color: black;
        }
    
        /* Responsive */
    
        @media(max-width:768px){
    
            .sidebar{
                width:100%;
            }
    
            .chat-window{
                display:none;
            }
    
        }
    </style>
</head>
<body>

<div class="chat-container">

    <!-- Mainbar -->
    <div class="sidebar">

        <div class="sidebar-header">
            <h1>Inbox</h1>
        </div>

        <div class="search-box">
            <input type="text" placeholder="Search...">
        </div>

        <div class="chat-list">
            {% for con in cons.items %}
            <div class="chat-item active">
                <img src="{{ con.1.image_url }}">
                <div class="chat-info">
                    <a href="{% url 'chat_room' conversation_id=con.0 %}" class="link">
                    <div class="top">
                        <h4>{{ con.1.other_user }}</h4>
                        <span>{{ con.1.created_at|slice:"10:16" }}</span>
                    </div>
                    <p>{{ con.1.last_message }}</p>
                    </a>
                </div>
                
            </div>
            {% endfor %}

        </div>

    </div>

</body>
